<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Joystick — Remote Controller</title>
    <script type="module" crossorigin src="/assets/joystick-CGRzfPt5.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/base-lRFd-gIO.js">
    <link rel="modulepreload" crossorigin href="/assets/vendor-socket-BcxXcwBL.js">
    <link rel="modulepreload" crossorigin href="/assets/vendor-nipple-BxsX8Mt3.js">
    <link rel="modulepreload" crossorigin href="/assets/vendor-babylon-BJ2_3OlT.js">
    <link rel="modulepreload" crossorigin href="/assets/shared-3d-CaDwl08V.js">
    <link rel="modulepreload" crossorigin href="/assets/shared-joystick-BtPVp1JY.js">
    <link rel="stylesheet" crossorigin href="/assets/base-XJX8cPGZ.css">
    <link rel="stylesheet" crossorigin href="/assets/joystick-lS1jVPzr.css">
    <link rel="stylesheet" crossorigin href="/assets/header-CefGsF17.css">
  </head>
  <body>
    <header>
      <a href="/">← Home</a>
      <h2>🕹️ Dual Control</h2>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="joystick-id">--</span>
        <span id="status">Connecting…</span>
      </div>
    </header>

    <div class="main-split">

      <!-- LEFT: controls -->
      <div class="controls-side">
        <div class="controls-row">

          <!-- analog joystick — movement -->
          <div class="joystick-panel">
            <span class="panel-label">Move</span>
            <div class="legend">
              <span></span>        <span>↑ Forward</span>
              <span>← Left</span>  <span>Right →</span>
              <span></span>        <span>↓ Back</span>
            </div>
            <div id="zone-left"></div>
            <div class="coords" id="coords-left">x: 0.00 &nbsp; y: 0.00</div>
          </div>

          <!-- fire button -->
          <div class="fire-panel">
            <span class="fire-label">Fire</span>
            <button id="btn-fire">🔴</button>
            <span class="fire-hint">hold to<br>rapid fire<br><span style="color:#1e1e2e">space</span></span>
          </div>

          <!-- D-pad — up/down/rotate -->
          <div class="joystick-panel">
            <span class="panel-label">Look</span>
            <div class="dpad">
              <button class="dpad-btn up"    id="btn-up">↑</button>
              <button class="dpad-btn left"  id="btn-left">↺</button>
              <button class="dpad-btn right" id="btn-right">↻</button>
              <button class="dpad-btn down"  id="btn-down">↓</button>
            </div>
            <div class="dpad-hint">
              ↑ Up &nbsp;·&nbsp; ↓ Down<br>
              ↺ CCW &nbsp;·&nbsp; ↻ CW
            </div>
            <div class="coords" id="coords-right">x: 0.00 &nbsp; y: 0.00</div>
          </div>

        </div>
        <div class="minimap-section">
          <span class="minimap-title">Map</span>
          <canvas id="minimap" width="192" height="192"></canvas>
          <div id="minimap-score" style="font-size:0.72rem;font-family:'Courier New',monospace;font-weight:700;letter-spacing:0.06em;color:#888;text-align:center;min-height:1.2em"></div>
        </div>
      </div>

      <!-- RIGHT: first-person view -->
      <div class="fpv-side">
        <div class="fpv-placeholder" id="fpv-placeholder">Waiting for joystick ID…</div>
        <iframe id="fpv-frame" style="display:none" allowfullscreen></iframe>
      </div>

    </div>

  </body>
</html>
