<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display — Remote Controller</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f0f13;
        color: #e0e0e0;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: #1a1a24;
        border-bottom: 1px solid #2a2a38;
        flex-shrink: 0;
      }

      header a {
        color: #5b6af0;
        text-decoration: none;
        font-size: 0.85rem;
      }

      header h2 {
        font-size: 1rem;
        font-weight: 600;
      }

      #status {
        font-size: 0.8rem;
        padding: 4px 10px;
        border-radius: 20px;
        background: #2a2a38;
        color: #888;
      }

      #status.connected {
        background: #1a3320;
        color: #4ade80;
      }

      #renderCanvas {
        flex: 1;
        width: 100%;
        display: block;
        outline: none;
      }
