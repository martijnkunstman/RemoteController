<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Person View — Remote Controller</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0f0f13;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
      }

      #score-hud {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(5, 5, 12, 0.72);
        padding: 5px 16px;
        border-radius: 18px;
        font-family: 'Courier New', monospace;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        pointer-events: none;
      }
      .score-blue { color: #4a7aff; }
      .score-sep  { color: #444; }
      .score-red  { color: #ff4040; }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas" touch-action="none"></canvas>
    <div id="score-hud">
      <span id="score-blue" class="score-blue">BLUE 0</span>
      <span class="score-sep">|</span>
      <span id="score-red" class="score-red">RED 0</span>
    </div>
    <script type="module" src="/src/firstpersonview.js"></script>
  </body>
</html>
