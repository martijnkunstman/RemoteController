<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display — Remote Controller</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f0f13;
        color: #e0e0e0;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: #1a1a24;
        border-bottom: 1px solid #2a2a38;
        flex-shrink: 0;
      }

      header a {
        color: #5b6af0;
        text-decoration: none;
        font-size: 0.85rem;
      }

      header h2 {
        font-size: 1rem;
        font-weight: 600;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #joystick-count {
        font-size: 0.78rem;
        padding: 4px 10px;
        border-radius: 20px;
        background: #1e1e2e;
        color: #888;
        font-variant-numeric: tabular-nums;
      }

      .auto-rotate-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        color: #888;
        cursor: pointer;
        user-select: none;
      }

      .auto-rotate-label input[type="checkbox"] {
        accent-color: #5b6af0;
        width: 14px;
        height: 14px;
        cursor: pointer;
      }

      #status {
        font-size: 0.8rem;
        padding: 4px 10px;
        border-radius: 20px;
        background: #2a2a38;
        color: #888;
      }

      #status.connected {
        background: #1a3320;
        color: #4ade80;
      }

      /* Canvas + label overlay wrapper */
      .canvas-wrapper {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
      }

      /* 2D label overlay — sits above the canvas, no pointer events */
      #labels {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #score-hud {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(5, 5, 12, 0.78);
        padding: 6px 18px;
        border-radius: 20px;
        font-family: 'Courier New', monospace;
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        pointer-events: none;
      }
      .score-blue { color: #4a7aff; }
      .score-sep  { color: #444; }
      .score-red  { color: #ff4040; }

      .vehicle-label {
        position: absolute;
        font-family: 'Courier New', monospace;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        background: rgba(5, 5, 10, 0.72);
        padding: 2px 7px;
        border-radius: 5px;
        border: 1px solid;
        white-space: nowrap;
        display: none;
        transform: translateY(-50%);
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/">← Home</a>
      <h2>🎯 3D Display</h2>
      <div class="header-right">
        <label class="auto-rotate-label">
          <input type="checkbox" id="auto-rotate" />
          Auto-rotate
        </label>
        <span id="joystick-count">No joysticks</span>
        <span id="status">Connecting…</span>
      </div>
    </header>

    <div class="canvas-wrapper">
      <canvas id="renderCanvas" touch-action="none"></canvas>
      <div id="labels"></div>
      <div id="score-hud">
        <span id="score-blue" class="score-blue">BLUE 0</span>
        <span class="score-sep">|</span>
        <span id="score-red" class="score-red">RED 0</span>
      </div>
    </div>

    <script type="module" src="/src/display.js"></script>
  </body>
</html>
