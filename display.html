<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display — Remote Controller</title>
    <link rel="stylesheet" href="/src/css/base.css" />
    <link rel="stylesheet" href="/src/css/header.css" />
    <link rel="stylesheet" href="/src/css/score-hud.css" />
    <link rel="stylesheet" href="/src/css/display.css" />
  </head>
  <body>
    <header>
      <a href="/">← Home</a>
      <h2>🎯 3D Display</h2>
      <div class="header-right">
        <label class="auto-rotate-label">
          <input type="checkbox" id="auto-rotate" />
          Auto-rotate
        </label>
        <span id="joystick-count">No joysticks</span>
        <span id="status">Connecting…</span>
      </div>
    </header>

    <div class="canvas-wrapper">
      <canvas id="renderCanvas" touch-action="none"></canvas>
      <div id="labels"></div>
      <div id="score-hud">
        <span id="score-blue" class="score-blue">BLUE 0</span>
        <span class="score-sep">|</span>
        <span id="score-red" class="score-red">RED 0</span>
      </div>
    </div>

    <script type="module" src="/src/display.js"></script>
  </body>
</html>
