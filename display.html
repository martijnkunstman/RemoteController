<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display — Remote Controller</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f0f13;
        color: #e0e0e0;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        background: #1a1a24;
        border-bottom: 1px solid #2a2a38;
        flex-shrink: 0;
      }

      header a {
        color: #5b6af0;
        text-decoration: none;
        font-size: 0.85rem;
      }

      header h2 {
        font-size: 1rem;
        font-weight: 600;
      }

      #status {
        font-size: 0.8rem;
        padding: 4px 10px;
        border-radius: 20px;
        background: #2a2a38;
        color: #888;
      }

      #status.connected {
        background: #1a3320;
        color: #4ade80;
      }

      #arena {
        flex: 1;
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f13 100%);
      }

      /* Subtle grid lines */
      #arena::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      #dot {
        position: absolute;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #5b6af0;
        box-shadow: 0 0 20px rgba(91, 106, 240, 0.6), 0 0 40px rgba(91, 106, 240, 0.2);
        transform: translate(-50%, -50%);
        transition: left 0.05s linear, top 0.05s linear;
        will-change: left, top;
      }

      #coords-display {
        position: absolute;
        bottom: 16px;
        right: 16px;
        font-size: 0.78rem;
        color: #444;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/">← Home</a>
      <h2>🎯 Display</h2>
      <span id="status">Connecting…</span>
    </header>

    <div id="arena">
      <div id="dot"></div>
      <div id="coords-display">x: 0.00 &nbsp; y: 0.00</div>
    </div>

    <script type="module" src="/src/display.js"></script>
  </body>
</html>
