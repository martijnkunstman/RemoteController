<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Joystick — Remote Controller</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f0f13;
        color: #e0e0e0;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        touch-action: none;
        user-select: none;
        overflow: hidden;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: #1a1a24;
        border-bottom: 1px solid #2a2a38;
        flex-shrink: 0;
        z-index: 10;
      }

      header a {
        color: #5b6af0;
        text-decoration: none;
        font-size: 0.85rem;
      }

      header h2 {
        font-size: 1rem;
        font-weight: 600;
      }

      #status {
        font-size: 0.8rem;
        padding: 4px 10px;
        border-radius: 20px;
        background: #2a2a38;
        color: #888;
      }

      #status.connected {
        background: #1a3320;
        color: #4ade80;
      }

      .joystick-row {
        flex: 1;
        display: flex;
      }

      .joystick-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        position: relative;
      }

      .joystick-panel:first-child {
        border-right: 1px solid #2a2a38;
      }

      .zone {
        width: 200px;
        height: 200px;
        position: relative;
        flex-shrink: 0;
      }

      .panel-label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #5b6af0;
      }

      .legend {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px 16px;
        font-size: 0.72rem;
        color: #555;
        text-align: center;
      }

      .legend span { color: #888; }

      .coords {
        font-size: 0.78rem;
        color: #444;
        font-variant-numeric: tabular-nums;
        min-height: 1.2em;
      }

      /* Nipplejs overrides */
      .nipple .front {
        background: #5b6af0 !important;
      }
      .nipple .back {
        background: rgba(91, 106, 240, 0.12) !important;
        border: 2px solid rgba(91, 106, 240, 0.35) !important;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/">← Home</a>
      <h2>🕹️ Dual Joystick</h2>
      <span id="status">Connecting…</span>
    </header>

    <div class="joystick-row">

      <!-- LEFT: movement -->
      <div class="joystick-panel">
        <span class="panel-label">Move</span>
        <div class="legend">
          <span></span>       <span>↑ Forward</span>
          <span>← Left</span> <span>Right →</span>
          <span></span>       <span>↓ Back</span>
        </div>
        <div class="zone" id="zone-left"></div>
        <div class="coords" id="coords-left">x: 0.00 &nbsp; y: 0.00</div>
      </div>

      <!-- RIGHT: look / elevation / rotation -->
      <div class="joystick-panel">
        <span class="panel-label">Look</span>
        <div class="legend">
          <span></span>       <span>↑ Up</span>
          <span>↺ CCW</span>  <span>CW ↻</span>
          <span></span>       <span>↓ Down</span>
        </div>
        <div class="zone" id="zone-right"></div>
        <div class="coords" id="coords-right">x: 0.00 &nbsp; y: 0.00</div>
      </div>

    </div>

    <script type="module" src="/src/joystick.js"></script>
  </body>
</html>
