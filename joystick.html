<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Joystick — Remote Controller</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f0f13;
        color: #e0e0e0;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        touch-action: none;
        user-select: none;
        overflow: hidden;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: #1a1a24;
        border-bottom: 1px solid #2a2a38;
        flex-shrink: 0;
        z-index: 10;
      }
      header a { color: #5b6af0; text-decoration: none; font-size: 0.85rem; }
      header h2 { font-size: 1rem; font-weight: 600; }

      #status {
        font-size: 0.8rem;
        padding: 4px 10px;
        border-radius: 20px;
        background: #2a2a38;
        color: #888;
      }
      #status.connected { background: #1a3320; color: #4ade80; }

      #joystick-id {
        font-family: 'Courier New', monospace;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        padding: 3px 10px;
        border-radius: 20px;
        background: #1e1e2e;
        color: #5b6af0;
        border: 1px solid #2a2a5a;
        min-width: 3ch;
        text-align: center;
      }

      /* ── main horizontal split ── */
      .main-split {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* ── left: controls ── */
      .controls-side {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #2a2a38;
      }

      .controls-row {
        flex: 1;
        display: flex;
        align-items: stretch;
      }

      .joystick-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 0 8px;
      }
      .joystick-panel:first-child { border-right: 1px solid #2a2a38; }
      .joystick-panel:last-child  { border-left:  1px solid #2a2a38; }

      .panel-label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #5b6af0;
      }

      .coords {
        font-size: 0.78rem;
        color: #444;
        font-variant-numeric: tabular-nums;
        min-height: 1.2em;
      }

      /* ── nipplejs zone ── */
      #zone-left {
        width: 200px;
        height: 200px;
        position: relative;
        flex-shrink: 0;
      }

      .legend {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px 16px;
        font-size: 0.72rem;
        color: #555;
        text-align: center;
      }
      .legend span { color: #888; }

      /* ── center: fire button ── */
      .fire-panel {
        width: 110px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      #btn-fire {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 3px solid #7a1a1a;
        background: radial-gradient(circle at 38% 38%, #c0392b, #7a0e0e);
        box-shadow:
          0 0 18px rgba(220, 50, 50, 0.35),
          inset 0 2px 4px rgba(255,255,255,0.12);
        cursor: pointer;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        transition: transform 0.07s, box-shadow 0.07s, background 0.07s;
        font-size: 1.4rem;
        color: rgba(255,255,255,0.85);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #btn-fire.active {
        transform: scale(0.88);
        background: radial-gradient(circle at 38% 38%, #ff6b6b, #c0392b);
        box-shadow:
          0 0 32px rgba(255, 80, 80, 0.75),
          0 0 60px rgba(255, 60, 60, 0.35),
          inset 0 2px 4px rgba(255,255,255,0.2);
      }

      .fire-label {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #7a1a1a;
      }
      .fire-hint {
        font-size: 0.65rem;
        color: #2a2a3a;
        text-align: center;
        line-height: 1.5;
      }

      /* ── right: D-pad ── */
      .dpad {
        display: grid;
        grid-template-areas:
          ". up ."
          "left . right"
          ". down .";
        grid-template-columns: 64px 64px 64px;
        grid-template-rows: 64px 64px 64px;
        gap: 6px;
      }

      .dpad-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1e1e2e;
        border: 2px solid #2a2a3e;
        border-radius: 12px;
        color: #aaa;
        font-size: 1.5rem;
        cursor: pointer;
        outline: none;
        transition: background 0.08s, border-color 0.08s, color 0.08s, transform 0.08s;
        -webkit-tap-highlight-color: transparent;
      }
      .dpad-btn.up    { grid-area: up; }
      .dpad-btn.down  { grid-area: down; }
      .dpad-btn.left  { grid-area: left; }
      .dpad-btn.right { grid-area: right; }
      .dpad-btn.active {
        background: #2a2d5a;
        border-color: #5b6af0;
        color: #fff;
        transform: scale(0.93);
      }

      .dpad-hint {
        font-size: 0.7rem;
        color: #3a3a50;
        text-align: center;
        line-height: 1.6;
      }

      /* nipplejs overrides */
      .nipple .front { background: #5b6af0 !important; }
      .nipple .back {
        background: rgba(91,106,240,0.12) !important;
        border: 2px solid rgba(91,106,240,0.35) !important;
      }

      /* ── right: first-person view iframe ── */
      .fpv-side {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      #fpv-frame {
        flex: 1;
        width: 100%;
        border: none;
        display: block;
        background: #0a0a0f;
      }

      .fpv-placeholder {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #333;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/">← Home</a>
      <h2>🕹️ Dual Control</h2>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="joystick-id">--</span>
        <span id="status">Connecting…</span>
      </div>
    </header>

    <div class="main-split">

      <!-- LEFT: controls -->
      <div class="controls-side">
        <div class="controls-row">

          <!-- analog joystick — movement -->
          <div class="joystick-panel">
            <span class="panel-label">Move</span>
            <div class="legend">
              <span></span>        <span>↑ Forward</span>
              <span>← Left</span>  <span>Right →</span>
              <span></span>        <span>↓ Back</span>
            </div>
            <div id="zone-left"></div>
            <div class="coords" id="coords-left">x: 0.00 &nbsp; y: 0.00</div>
          </div>

          <!-- fire button -->
          <div class="fire-panel">
            <span class="fire-label">Fire</span>
            <button id="btn-fire">🔴</button>
            <span class="fire-hint">hold to<br>rapid fire<br><span style="color:#1e1e2e">space</span></span>
          </div>

          <!-- D-pad — up/down/rotate -->
          <div class="joystick-panel">
            <span class="panel-label">Look</span>
            <div class="dpad">
              <button class="dpad-btn up"    id="btn-up">↑</button>
              <button class="dpad-btn left"  id="btn-left">↺</button>
              <button class="dpad-btn right" id="btn-right">↻</button>
              <button class="dpad-btn down"  id="btn-down">↓</button>
            </div>
            <div class="dpad-hint">
              ↑ Up &nbsp;·&nbsp; ↓ Down<br>
              ↺ CCW &nbsp;·&nbsp; ↻ CW
            </div>
            <div class="coords" id="coords-right">x: 0.00 &nbsp; y: 0.00</div>
          </div>

        </div>
      </div>

      <!-- RIGHT: first-person view -->
      <div class="fpv-side">
        <div class="fpv-placeholder" id="fpv-placeholder">Waiting for joystick ID…</div>
        <iframe id="fpv-frame" style="display:none" allowfullscreen></iframe>
      </div>

    </div>

    <script type="module" src="/src/joystick.js"></script>
  </body>
</html>
